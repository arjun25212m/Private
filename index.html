<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
</head>
<body>
    <h2>Private Chat</h2>
    <div id="login">
        <input type="text" id="name" placeholder="Your Name" />
        <input type="text" id="room" placeholder="Room Name" />
        <input type="password" id="pass" placeholder="Password" />
        <button onclick="joinRoom()">Join</button>
        <div id="error"></div>
    </div>
    <div id="chat" style="display:none;">
        <div id="messages"></div>
        <input type="text" id="msg" placeholder="Message..." />
        <button onclick="sendMsg()">Send</button>
        <button onclick="sendImage()">📸</button>
        <button onclick="exitRoom()">Exit</button>
    </div>
    <a href="admin.html">Admin</a>

    <script>
        let peer, conn, room, user;

        function showError(msg) {
            document.getElementById('error').textContent = msg;
        }

        function initPeer() {
            return new Promise((resolve) => {
                peer = new Peer();
                peer.on('open', (id) => {
                    console.log('Peer ID:', id);
                    resolve(id);
                });
                peer.on('error', (err) => {
                    showError('Error: ' + err.message);
                });
                peer.on('connection', (c) => {
                    conn = c;
                    conn.on('data', (data) => {
                        if (data.type === 'msg') {
                            addMsg(data.sender, data.text);
                        } else if (data.type === 'img') {
                            addImage(data.sender, data.image, data.caption);
                        }
                    });
                });
            });
        }

        async function joinRoom() {
            const name = document.getElementById('name').value.trim();
            const roomName = document.getElementById('room').value.trim();
            const pass = document.getElementById('pass').value.trim();
            if (!name || !roomName || !pass) { showError('Fill all fields'); return; }

            user = name;
            room = roomName;

            // Save room data
            let data = JSON.parse(localStorage.getItem('room_' + room) || 'null');
            if (!data) {
                data = { password: pass, users: [], messages: [] };
            }
            if (data.password !== pass) { showError('Wrong password'); return; }
            if (!data.users.includes(user)) data.users.push(user);
            localStorage.setItem('room_' + room, JSON.stringify(data));

            // Load messages
            document.getElementById('messages').innerHTML = '';
            if (data.messages) {
                data.messages.forEach(m => {
                    if (m.type === 'img') addImage(m.sender, m.image, m.caption);
                    else addMsg(m.sender, m.text);
                });
            }

            // Init peer & connect
            if (!peer) await initPeer();

            // Connect to others
            localStorage.setItem('peer_connect_' + room, JSON.stringify({ peerId: peer.id, user: user }));
            setTimeout(() => {
                const pData = localStorage.getItem('peer_connect_' + room);
                if (pData) {
                    const info = JSON.parse(pData);
                    if (info.peerId !== peer.id) {
                        conn = peer.connect(info.peerId);
                        conn.on('data', (data) => {
                            if (data.type === 'msg') addMsg(data.sender, data.text);
                            else if (data.type === 'img') addImage(data.sender, data.image, data.caption);
                        });
                        localStorage.removeItem('peer_connect_' + room);
                    }
                }
            }, 2000);

            document.getElementById('login').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            document.getElementById('msg').focus();
        }

        function addMsg(sender, text) {
            const div = document.createElement('div');
            div.textContent = (sender === user ? 'You' : sender) + ': ' + text;
            document.getElementById('messages').appendChild(div);
        }

        function addImage(sender, imageData, caption) {
            const div = document.createElement('div');
            div.innerHTML = (sender === user ? 'You' : sender) + ': <img src="' + imageData + '" style="max-width:150px;max-height:150px;display:block;" />' + (caption ?
                '<br/><small>' + caption + '</small>' : '');
            document.getElementById('messages').appendChild(div);
        }

        function sendMsg() {
            const text = document.getElementById('msg').value.trim();
            if (!text || !room) return;
            const data = JSON.parse(localStorage.getItem('room_' + room));
            if (data) {
                if (!data.messages) data.messages = [];
                data.messages.push({ sender: user, type: 'text', text: text });
                localStorage.setItem('room_' + room, JSON.stringify(data));
            }
            if (conn) conn.send({ type: 'msg', sender: user, text: text });
            addMsg(user, text);
            document.getElementById('msg').value = '';
        }

        function sendImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const imgData = ev.target.result;
                    const caption = prompt('Caption:') || '';
                    const data = JSON.parse(localStorage.getItem('room_' + room));
                    if (data) {
                        if (!data.messages) data.messages = [];
                        data.messages.push({ sender: user, type: 'img', image: imgData, caption: caption });
                        localStorage.setItem('room_' + room, JSON.stringify(data));
                    }
                    if (conn) conn.send({ type: 'img', sender: user, image: imgData, caption: caption });
                    addImage(user, imgData, caption);
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function exitRoom() {
            const data = JSON.parse(localStorage.getItem('room_' + room));
            if (data) {
                data.users = data.users.filter(u => u !== user);
                if (data.users.length === 0) localStorage.removeItem('room_' + room);
                else localStorage.setItem('room_' + room, JSON.stringify(data));
            }
            if (conn) conn.close();
            room = '';
            user = '';
            document.getElementById('login').style.display = 'block';
            document.getElementById('chat').style.display = 'none';
            document.getElementById('messages').innerHTML = '';
        }

        // Auto refresh rooms for admin
        setInterval(() => {
            // Just keep connection alive
        }, 5000);

        console.log('💕 Chat App Loaded!');
    </script>
</body>
</html>
