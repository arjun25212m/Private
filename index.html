<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💕 Private Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e14;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }
        .container {
            background: #1a2029;
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 420px;
            height: 96vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
        }
        h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 12px;
            color: #5fc3ff;
            letter-spacing: 1px;
        }
        #loginSection {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-group {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #a0b8d0;
            font-weight: 500;
        }
        input,
        select {
            width: 100%;
            padding: 13px 16px;
            border: none;
            border-radius: 30px;
            background: #2a3340;
            color: #fff;
            font-size: 15px;
            outline: 2px solid transparent;
            transition: 0.3s;
        }
        input:focus,
        select:focus {
            outline-color: #4c9aff;
            background: #1f2833;
        }
        input::placeholder {
            color: #6f859c;
        }
        select option {
            background: #1a2029;
            color: #fff;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: #4c9aff;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-danger {
            background: #d9534f;
        }
        .btn-danger:active {
            background: #b52b27;
        }
        .btn-success {
            background: #28a745;
        }
        .btn-success:active {
            background: #1e7e34;
        }
        .btn-warning {
            background: #ffc107;
            color: #000;
        }
        .btn-warning:active {
            background: #e0a800;
        }
        #errorBox {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            min-height: 20px;
        }
        .hint {
            font-size: 11px;
            color: #5f7490;
            text-align: center;
            margin-top: 10px;
        }
        #chatArea {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        #roomStatus {
            text-align: center;
            font-size: 12px;
            color: #7a96b5;
            padding: 6px 0 10px 0;
            border-bottom: 1px solid #2a3340;
        }
        #roomStatus span {
            color: #5fc3ff;
            font-weight: bold;
        }
        #messages {
            flex: 1;
            background: #11161e;
            padding: 12px;
            border-radius: 16px;
            overflow-y: auto;
            margin: 8px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 0;
        }
        #messages .msg {
            padding: 6px 12px;
            border-radius: 16px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #messages .msg.me {
            background: #1d6bb3;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        #messages .msg.other {
            background: #2a3340;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        #messages .msg.system {
            background: transparent;
            color: #6f859c;
            font-size: 11px;
            align-self: center;
            max-width: 100%;
            font-style: italic;
        }
        #messages .msg.admin {
            background: #8e44ad;
            align-self: center;
            max-width: 90%;
            text-align: center;
            font-weight: bold;
            color: #fff;
        }
        .msg .username-tag {
            font-weight: bold;
            color: #5fc3ff;
            font-size: 12px;
            display: block;
            margin-bottom: 2px;
        }
        .msg.other .username-tag {
            color: #f1c40f;
        }
        .msg.me .username-tag {
            color: #5fc3ff;
        }
        .emoji-row {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin: 4px 0 6px 0;
            flex-wrap: wrap;
        }
        .emoji-row button {
            background: #2a3340;
            border: none;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .emoji-row button:active {
            transform: scale(0.85);
            background: #3d4a5c;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 11px 14px;
        }
        .input-row .btn {
            width: auto;
            padding: 11px 20px;
            margin-top: 0;
            font-size: 14px;
        }
        .exit-row {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }
        .exit-row .btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }
        #messages::-webkit-scrollbar {
            width: 4px;
        }
        #messages::-webkit-scrollbar-track {
            background: #11161e;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #3d4a5c;
            border-radius: 10px;
        }
        .loading {
            text-align: center;
            color: #6f859c;
            font-size: 13px;
            padding: 20px;
        }
        .room-list {
            background: #11161e;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
            max-height: 120px;
            overflow-y: auto;
        }
        .room-list .room-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid #2a3340;
            font-size: 13px;
        }
        .room-list .room-item:last-child {
            border-bottom: none;
        }
        .room-list .room-item .room-name {
            color: #5fc3ff;
        }
        .room-list .room-item .room-users {
            color: #7a96b5;
            font-size: 11px;
        }
        .room-list .room-item .join-btn-sm {
            background: #4c9aff;
            border: none;
            border-radius: 20px;
            padding: 2px 12px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
        }
        .room-list .room-item .join-btn-sm:active {
            transform: scale(0.95);
        }
        .admin-panel {
            background: #11161e;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #8e44ad;
        }
        .admin-panel h4 {
            color: #8e44ad;
            font-size: 13px;
            margin-bottom: 6px;
            text-align: center;
        }
        .user-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #7a96b5;
            padding: 2px 0;
        }
        .user-status .online {
            color: #28a745;
        }
        .user-status .offline {
            color: #d9534f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔒 Private Chat 💕</h2>

        <!-- Login Section -->
        <div id="loginSection">
            <div class="form-group">
                <label>👤 Your Name</label>
                <input type="text" id="userName" placeholder="e.g. Arjun, Priya..." autocomplete="off" />
            </div>
            <div class="form-group">
                <label>🏷️ Room Name</label>
                <input type="text" id="roomName" placeholder="e.g. love-forever" autocomplete="off" />
            </div>
            <div class="form-group">
                <label>🔑 Room Password</label>
                <input type="password" id="roomPass" placeholder="Enter room password" />
            </div>
            <button class="btn" id="joinBtn">🚪 Join / Create Room</button>

            <div id="errorBox"></div>

            <!-- Active Rooms List -->
            <div style="margin-top:10px;">
                <label style="font-size:12px; color:#7a96b5;">📡 Active Rooms</label>
                <div class="room-list" id="roomList">
                    <div style="color:#5f7490; font-size:12px; text-align:center; padding:8px;">
                        Loading rooms...
                    </div>
                </div>
            </div>

            <p class="hint">💡 Same room + password = same chat • Apna naam rakho</p>
        </div>

        <!-- Chat Section -->
        <div id="chatArea">
            <div id="roomStatus">
                🟢 Room: <span id="displayRoom"></span> &nbsp;|&nbsp; 👤 <span id="displayUser"></span>
            </div>

            <!-- Admin Panel -->
            <div class="admin-panel" id="adminPanel" style="display:none;">
                <h4>👑 Admin Control</h4>
                <div id="adminUsersList">
                    <div style="color:#5f7490; font-size:12px;">Loading users...</div>
                </div>
            </div>

            <div id="messages">
                <div class="loading">💬 Waiting for messages...</div>
            </div>

            <div class="emoji-row">
                <button onclick="addEmoji('❤️')">❤️</button>
                <button onclick="addEmoji('😘')">😘</button>
                <button onclick="addEmoji('💕')">💕</button>
                <button onclick="addEmoji('🥰')">🥰</button>
                <button onclick="addEmoji('😍')">😍</button>
                <button onclick="addEmoji('💋')">💋</button>
                <button onclick="addEmoji('🔥')">🔥</button>
                <button onclick="addEmoji('🌹')">🌹</button>
                <button onclick="addEmoji('😎')">😎</button>
                <button onclick="addEmoji('🤗')">🤗</button>
            </div>

            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Type a message..." />
                <button class="btn" id="sendBtn">Send</button>
            </div>
            <div class="exit-row">
                <button class="btn btn-danger" id="exitBtn">🚪 Exit Room</button>
                <button class="btn btn-warning" id="adminViewBtn" style="display:none;">👑 Admin View</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // ✅ APNA RENDER URL YAHAN DAALEIN
        // ============================================
        const SOCKET_URL = 'https://private-chat-backend-qklg.onrender.com';

        const socket = io(SOCKET_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 5
        });

        // DOM Elements
        const loginSection = document.getElementById('loginSection');
        const chatArea = document.getElementById('chatArea');
        const userNameInput = document.getElementById('userName');
        const roomNameInput = document.getElementById('roomName');
        const roomPassInput = document.getElementById('roomPass');
        const joinBtn = document.getElementById('joinBtn');
        const exitBtn = document.getElementById('exitBtn');
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const messagesDiv = document.getElementById('messages');
        const displayRoom = document.getElementById('displayRoom');
        const displayUser = document.getElementById('displayUser');
        const errorBox = document.getElementById('errorBox');
        const roomListDiv = document.getElementById('roomList');
        const adminPanel = document.getElementById('adminPanel');
        const adminUsersList = document.getElementById('adminUsersList');
        const adminViewBtn = document.getElementById('adminViewBtn');

        // State
        let currentRoom = '';
        let currentPassword = '';
        let username = '';
        let isAdmin = false;

        // ============ Helper Functions ============
        function addEmoji(emoji) {
            msgInput.value += emoji;
            msgInput.focus();
        }

        function addMessage(sender, text, isSystem = false, isAdmin = false) {
            const loading = messagesDiv.querySelector('.loading');
            if (loading) loading.remove();

            const div = document.createElement('div');
            div.className = 'msg';

            if (isSystem) {
                div.className = 'msg system';
                div.textContent = text;
            } else if (isAdmin) {
                div.className = 'msg admin';
                div.textContent = '👑 ' + text;
            } else if (sender === username) {
                div.className = 'msg me';
                div.innerHTML = `<span class="username-tag">You</span> ${text}`;
            } else {
                div.className = 'msg other';
                div.innerHTML = `<span class="username-tag">${sender}</span> ${text}`;
            }

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function clearMessages() {
            messagesDiv.innerHTML = '<div class="loading">💬 Waiting for messages...</div>';
        }

        function showError(msg) {
            errorBox.textContent = msg;
            setTimeout(() => {
                if (errorBox.textContent === msg) {
                    errorBox.textContent = '';
                }
            }, 5000);
        }

        function updateRoomList(rooms) {
            if (!rooms || Object.keys(rooms).length === 0) {
                roomListDiv.innerHTML = '<div style="color:#5f7490; font-size:12px; text-align:center; padding:8px;">No active rooms</div>';
                return;
            }

            let html = '';
            for (let roomName in rooms) {
                const room = rooms[roomName];
                const userCount = room.users ? room.users.length : 0;
                html += `
                    <div class="room-item">
                        <span class="room-name">🏠 ${roomName}</span>
                        <span class="room-users">👤 ${userCount} users</span>
                        <button class="join-btn-sm" onclick="quickJoin('${roomName}')">Join</button>
                    </div>
                `;
            }
            roomListDiv.innerHTML = html;
        }

        function quickJoin(roomName) {
            roomNameInput.value = roomName;
            // Auto-join
            joinBtn.click();
        }

        // ============ Admin Functions ============
        function updateAdminPanel(users) {
            if (!isAdmin) return;

            adminPanel.style.display = 'block';
            if (!users || users.length === 0) {
                adminUsersList.innerHTML = '<div style="color:#5f7490; font-size:12px;">No users in this room</div>';
                return;
            }

            let html = '';
            users.forEach(user => {
                const status = user.online ? '🟢 Online' : '🔴 Offline';
                html += `
                    <div class="user-status">
                        <span>👤 ${user.name}</span>
                        <span class="${user.online ? 'online' : 'offline'}">${status}</span>
                    </div>
                `;
            });
            adminUsersList.innerHTML = html;
        }

        // ============ Join Room ============
        function joinRoom() {
            const name = userNameInput.value.trim();
            const room = roomNameInput.value.trim();
            const pass = roomPassInput.value.trim();

            if (!name || !room || !pass) {
                showError('❌ Please enter name, room and password');
                return;
            }

            username = name;
            currentRoom = room;
            currentPassword = pass;
            errorBox.textContent = '';

            // Check if user is admin (room owner)
            // Admin = first person to join a room
            socket.emit('join-room', {
                room: room,
                password: pass,
                username: name
            });
        }

        // ============ Send Message ============
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !currentRoom) return;

            socket.emit('send-message', {
                room: currentRoom,
                text: text
            });
            msgInput.value = '';
            msgInput.focus();
        }

        // ============ Exit Room ============
        function exitRoom() {
            if (!currentRoom) return;

            socket.emit('exit-room', { room: currentRoom });
            currentRoom = '';
            username = '';
            isAdmin = false;

            loginSection.style.display = 'flex';
            chatArea.style.display = 'none';
            clearMessages();
            adminPanel.style.display = 'none';
            adminViewBtn.style.display = 'none';
            errorBox.textContent = '✅ Room cleared. All data deleted.';
            roomNameInput.value = '';
            roomPassInput.value = '';

            setTimeout(() => {
                if (errorBox.textContent === '✅ Room cleared. All data deleted.') {
                    errorBox.textContent = '';
                }
            }, 4000);
        }

        // ============ Admin View ============
        function toggleAdminView() {
            if (isAdmin) {
                // Request user list from server
                socket.emit('get-room-users', { room: currentRoom });
            }
        }

        // ============ Socket Events ============
        socket.on('connect', () => {
            console.log('✅ Connected to server');
            errorBox.textContent = '';
            // Request room list
            socket.emit('get-rooms');
        });

        socket.on('disconnect', () => {
            showError('⚠️ Disconnected from server. Reconnecting...');
        });

        socket.on('connect_error', (err) => {
            showError('❌ Connection failed: ' + err.message);
        });

        socket.on('rooms-list', (rooms) => {
            updateRoomList(rooms);
        });

        socket.on('load-messages', (data) => {
            clearMessages();
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(msg => {
                    addMessage(msg.sender, msg.text);
                });
            }

            // Check if user is admin (first in room)
            isAdmin = data.isAdmin || false;
            if (isAdmin) {
                adminPanel.style.display = 'block';
                adminViewBtn.style.display = 'block';
                adminViewBtn.textContent = '👑 Admin: ' + data.userCount + ' users';
            }

            loginSection.style.display = 'none';
            chatArea.style.display = 'flex';
            displayRoom.textContent = currentRoom;
            displayUser.textContent = username;
            msgInput.focus();
        });

        socket.on('new-message', (msg) => {
            addMessage(msg.sender, msg.text);
        });

        socket.on('system-message', (text) => {
            addMessage('', text, true);
        });

        socket.on('admin-message', (text) => {
            addMessage('', text, false, true);
        });

        socket.on('room-users-update', (users) => {
            if (isAdmin) {
                updateAdminPanel(users);
                adminViewBtn.textContent = '👑 Admin: ' + users.length + ' users';
            }
        });

        socket.on('error', (err) => {
            showError('❌ ' + err);
            if (err.includes('Wrong password')) {
                roomPassInput.value = '';
                roomPassInput.focus();
            }
        });

        // ============ Event Listeners ============
        joinBtn.addEventListener('click', joinRoom);
        sendBtn.addEventListener('click', sendMessage);
        exitBtn.addEventListener('click', exitRoom);
        adminViewBtn.addEventListener('click', toggleAdminView);

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        roomPassInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });

        roomNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomPassInput.focus();
        });

        userNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomNameInput.focus();
        });

        // Auto-request rooms every 5 seconds
        setInterval(() => {
            if (!currentRoom) {
                socket.emit('get-rooms');
            }
        }, 5000);

        window.addEventListener('beforeunload', function() {
            if (currentRoom) {
                socket.emit('exit-room', { room: currentRoom });
            }
        });

        console.log('💕 Private Chat App Loaded!');
        console.log('📡 Server URL:', SOCKET_URL);
    </script>

</body>
</html>
