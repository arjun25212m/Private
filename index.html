<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💬 Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b141a;
            color: #e9edef;
            height: 100vh;
            overflow: hidden;
        }

        #loginSection {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b141a;
            padding: 20px;
        }

        .login-box {
            background: #1f2c33;
            border-radius: 28px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .login-box .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }

        .login-box h2 {
            text-align: center;
            font-size: 22px;
            color: #e9edef;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .login-box .sub {
            text-align: center;
            font-size: 13px;
            color: #8696a0;
            margin-bottom: 20px;
        }

        .login-box .form-group {
            margin-bottom: 14px;
        }

        .login-box label {
            display: block;
            font-size: 12px;
            color: #8696a0;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #2a3942;
            color: #e9edef;
            font-size: 15px;
            outline: 2px solid transparent;
            transition: 0.3s;
        }

        .login-box input:focus {
            outline-color: #00a884;
            background: #1f2c33;
        }

        .login-box input::placeholder {
            color: #5e6f7a;
        }

        .login-box .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #00a884;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .login-box .btn:active {
            transform: scale(0.97);
            background: #008f72;
        }

        .login-box .error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }

        .login-box .admin-link {
            text-align: center;
            margin-top: 14px;
        }

        .login-box .admin-link a {
            color: #5e6f7a;
            font-size: 12px;
            text-decoration: none;
        }

        #chatArea {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: #0b141a;
        }

        .chat-header {
            background: #1f2c33;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a3942;
            flex-shrink: 0;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }

        .chat-header .info {
            flex: 1;
            min-width: 0;
        }

        .chat-header .info .name {
            font-size: 16px;
            font-weight: 500;
            color: #e9edef;
        }

        .chat-header .info .status {
            font-size: 12px;
            color: #8696a0;
        }

        .chat-header .info .status.online {
            color: #00a884;
        }

        .chat-header .exit-btn {
            background: transparent;
            border: none;
            color: #8696a0;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .chat-header .exit-btn:active {
            background: #2a3942;
        }

        #messages {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #0b141a;
            min-height: 0;
        }

        #messages .msg {
            padding: 8px 14px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #messages .msg.me {
            background: #005c4b;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        #messages .msg.other {
            background: #1f2c33;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        #messages .msg.system {
            background: transparent;
            color: #8696a0;
            font-size: 12px;
            align-self: center;
            max-width: 100%;
            text-align: center;
            padding: 6px 12px;
        }

        #messages .msg .sender {
            font-size: 12px;
            font-weight: 600;
            color: #00a884;
            display: block;
            margin-bottom: 2px;
        }

        #messages .msg.me .sender {
            color: #7ec8e3;
        }

        #messages .msg .time {
            font-size: 10px;
            color: #8696a0;
            float: right;
            margin-left: 10px;
            margin-top: 2px;
        }

        #messages .msg.me .time {
            color: #7ec8e3;
        }

        #messages .msg-image {
            max-width: 85%;
            align-self: flex-start;
            padding: 6px;
            border-radius: 12px;
            background: #1f2c33;
            border: 1px solid #2a3942;
            margin: 2px 0;
        }

        #messages .msg-image.me {
            align-self: flex-end;
            border-color: #005c4b;
            background: #005c4b;
        }

        #messages .msg-image img {
            max-width: 200px;
            max-height: 250px;
            border-radius: 8px;
            display: block;
        }

        #messages .msg-image .image-sender {
            font-size: 11px;
            font-weight: 600;
            color: #00a884;
            display: block;
            margin-top: 2px;
        }

        #messages .msg-image.me .image-sender {
            color: #7ec8e3;
        }

        #messages .msg-image .image-caption {
            font-size: 13px;
            color: #e9edef;
            margin-top: 2px;
        }

        #messages .msg-image .image-time {
            font-size: 10px;
            color: #8696a0;
            float: right;
            margin-left: 8px;
        }

        #messages .msg-image.me .image-time {
            color: #7ec8e3;
        }

        .loading-msg {
            text-align: center;
            color: #8696a0;
            font-size: 13px;
            padding: 30px 0;
        }

        .chat-bottom {
            background: #1f2c33;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #2a3942;
            flex-shrink: 0;
        }

        .chat-bottom .image-btn {
            background: transparent;
            border: none;
            color: #8696a0;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .chat-bottom .image-btn:active {
            background: #2a3942;
        }

        .chat-bottom input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 20px;
            background: #2a3942;
            color: #e9edef;
            font-size: 15px;
            outline: none;
            min-width: 0;
        }

        .chat-bottom input::placeholder {
            color: #5e6f7a;
        }

        .chat-bottom .send-btn {
            background: #00a884;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-bottom .send-btn:active {
            transform: scale(0.92);
            background: #008f72;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #2a3942;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
            .chat-header {
                padding: 10px 12px;
            }
            .chat-header .info .name {
                font-size: 14px;
            }
            #messages {
                padding: 8px 12px;
            }
            #messages .msg {
                font-size: 13px;
                padding: 6px 12px;
            }
            #messages .msg-image img {
                max-width: 150px;
                max-height: 180px;
            }
            .chat-bottom {
                padding: 6px 10px;
            }
            .chat-bottom input {
                font-size: 14px;
                padding: 8px 12px;
            }
            .chat-bottom .send-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div id="loginSection">
        <div class="login-box">
            <div class="logo">💬</div>
            <h2>Private Chat</h2>
            <p class="sub">Same room + password = same chat</p>

            <div class="form-group">
                <label>👤 Your Name</label>
                <input type="text" id="userName" placeholder="Enter your name..." />
            </div>
            <div class="form-group">
                <label>🏷️ Room Name</label>
                <input type="text" id="roomName" placeholder="Enter room name..." />
            </div>
            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" id="roomPass" placeholder="Enter password..." />
            </div>

            <button class="btn" id="joinBtn">Join / Create Room</button>
            <div class="error" id="errorBox"></div>

            <div class="admin-link">
                <a href="admin.html">👑 Admin Panel</a>
            </div>
        </div>
    </div>

    <div id="chatArea">
        <div class="chat-header">
            <div class="avatar" id="avatarDisplay">👤</div>
            <div class="info">
                <div class="name" id="displayRoom">Room</div>
                <div class="status online" id="statusDisplay">● Online</div>
            </div>
            <button class="exit-btn" id="exitBtn" title="Exit Room">✕</button>
        </div>

        <div id="messages">
            <div class="loading-msg">💬 No messages yet</div>
        </div>

        <div class="chat-bottom">
            <button class="image-btn" id="imageBtn">📸</button>
            <input type="text" id="msgInput" placeholder="Type a message..." />
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        // ============================================================
        // NO BACKEND! PEER-TO-PEER CHAT
        // ============================================================

        // ============ DOM ============
        const loginSection = document.getElementById('loginSection');
        const chatArea = document.getElementById('chatArea');
        const userNameInput = document.getElementById('userName');
        const roomNameInput = document.getElementById('roomName');
        const roomPassInput = document.getElementById('roomPass');
        const joinBtn = document.getElementById('joinBtn');
        const exitBtn = document.getElementById('exitBtn');
        const sendBtn = document.getElementById('sendBtn');
        const imageBtn = document.getElementById('imageBtn');
        const msgInput = document.getElementById('msgInput');
        const messagesDiv = document.getElementById('messages');
        const displayRoom = document.getElementById('displayRoom');
        const avatarDisplay = document.getElementById('avatarDisplay');
        const statusDisplay = document.getElementById('statusDisplay');
        const errorBox = document.getElementById('errorBox');

        // ============ STATE ============
        let currentRoom = '';
        let username = '';
        let peer = null;
        let peerId = null;
        let conn = null;
        let isOnline = false;

        // ============ HELPERS ============
        function showError(msg) {
            errorBox.textContent = msg;
            setTimeout(() => {
                if (errorBox.textContent === msg) errorBox.textContent = '';
            }, 5000);
        }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function setStatus(online) {
            isOnline = online;
            statusDisplay.textContent = online ? '● Online' : '● Offline';
            statusDisplay.className = 'status' + (online ? ' online' : '');
        }

        function getAvatar(name) {
            return name.charAt(0).toUpperCase();
        }

        // ============ LOCALSTORAGE ============
        function getRoomData(room) {
            try {
                const data = localStorage.getItem('room_' + room);
                return data ? JSON.parse(data) : null;
            } catch (e) { return null; }
        }

        function setRoomData(room, data) {
            localStorage.setItem('room_' + room, JSON.stringify(data));
        }

        function deleteRoomData(room) {
            localStorage.removeItem('room_' + room);
        }

        // ============ ADD MESSAGES ============
        function addMessage(sender, text, isSystem = false) {
            const loading = messagesDiv.querySelector('.loading-msg');
            if (loading) loading.remove();

            const div = document.createElement('div');
            div.className = 'msg';

            if (isSystem) {
                div.className = 'msg system';
                div.textContent = text;
            } else if (sender === username) {
                div.className = 'msg me';
                div.innerHTML = `<span class="sender">You</span> ${text} <span class="time">${getTime()}</span>`;
            } else {
                div.className = 'msg other';
                div.innerHTML = `<span class="sender">${sender}</span> ${text} <span class="time">${getTime()}</span>`;
            }

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addImageMessage(sender, imageData, caption = '') {
            const loading = messagesDiv.querySelector('.loading-msg');
            if (loading) loading.remove();

            const div = document.createElement('div');
            div.className = 'msg-image';
            if (sender === username) div.classList.add('me');

            const senderName = sender === username ? 'You' : sender;
            const time = getTime();

            div.innerHTML = `
                <span class="image-sender">${senderName} <span class="image-time">${time}</span></span>
                <img src="${imageData}" alt="Image" />
                ${caption ? `<div class="image-caption">${caption}</div>` : ''}
            `;

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function clearMessages() {
            messagesDiv.innerHTML = '<div class="loading-msg">💬 No messages yet</div>';
        }

        // ============ SEND IMAGE ============
        function sendImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const imageData = event.target.result;
                    const caption = prompt('📝 Add a caption (optional):') || '';

                    // Save to storage
                    const roomData = getRoomData(currentRoom);
                    if (roomData) {
                        if (!roomData.messages) roomData.messages = [];
                        roomData.messages.push({
                            sender: username,
                            type: 'image',
                            image: imageData,
                            caption: caption,
                            time: Date.now()
                        });
                        setRoomData(currentRoom, roomData);
                    }

                    // Send to peer
                    if (conn && conn.open) {
                        conn.send({
                            type: 'image',
                            sender: username,
                            image: imageData,
                            caption: caption
                        });
                    }

                    addImageMessage(username, imageData, caption);
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // ============ PEERJS ============
        function initPeer() {
            return new Promise((resolve, reject) => {
                if (peer && peer.open) {
                    resolve(peer.id);
                    return;
                }

                if (peer) {
                    try { peer.destroy(); } catch (e) {}
                    peer = null;
                }

                peer = new Peer({
                    debug: 2,
                    config: {
                        'iceServers': [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                const timeout = setTimeout(() => {
                    reject(new Error('Connection timeout'));
                }, 15000);

                peer.on('open', (id) => {
                    clearTimeout(timeout);
                    peerId = id;
                    console.log('✅ Peer ID:', id);
                    setStatus(true);
                    resolve(id);
                });

                peer.on('error', (err) => {
                    clearTimeout(timeout);
                    console.error('Peer error:', err);
                    setStatus(false);
                    reject(err);
                });

                peer.on('connection', (c) => {
                    console.log('📡 Incoming connection from:', c.peer);
                    setupConnection(c);
                });

                peer.on('disconnected', () => {
                    console.log('⚠️ Peer disconnected');
                    setStatus(false);
                    if (peer && !peer.destroyed) {
                        setTimeout(() => {
                            if (peer) peer.reconnect();
                        }, 3000);
                    }
                });
            });
        }

        // ============ SETUP CONNECTION ============
        function setupConnection(c) {
            const room = c.metadata?.room;
            if (!room) {
                console.warn('Connection without room');
                return;
            }

            if (conn && conn.open && conn.peer === c.peer) {
                return;
            }

            conn = c;

            c.on('data', (data) => {
                console.log('📩 Received:', data.type, 'from:', data.sender);
                if (data.type === 'message') {
                    addMessage(data.sender, data.text);
                } else if (data.type === 'image') {
                    addImageMessage(data.sender, data.image, data.caption);
                } else if (data.type === 'system') {
                    addMessage('', data.text, true);
                }
            });

            c.on('close', () => {
                console.log('🔴 Connection closed:', c.peer);
                addMessage('', '🔴 User disconnected', true);
                if (conn === c) {
                    conn = null;
                }
            });

            c.on('error', (err) => {
                console.error('Connection error:', err);
                if (conn === c) {
                    conn = null;
                }
            });

            if (c.open) {
                c.send({ type: 'system', text: `🟢 ${username} joined the chat` });
                console.log('📡 Connected to:', c.peer);
            }
        }

        // ============ CONNECT TO ROOM ============
        function connectToRoom(room) {
            const peerKey = 'peer_connect_' + room;

            // Clean up old entries
            for (let key in localStorage) {
                if (key.startsWith('peer_connect_') && key !== peerKey) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.peerId === peerId) {
                            localStorage.removeItem(key);
                        }
                    } catch (e) {}
                }
            }

            // Register ourselves
            const myData = {
                peerId: peerId,
                username: username,
                room: room,
                timestamp: Date.now()
            };
            localStorage.setItem(peerKey, JSON.stringify(myData));

            // Try to connect to others
            const tryConnect = () => {
                for (let key in localStorage) {
                    if (key.startsWith('peer_connect_') && key !== peerKey) {
                        try {
                            const data = JSON.parse(localStorage.getItem(key));
                            if (data.peerId !== peerId && data.room === room) {
                                if (conn && conn.open && conn.peer === data.peerId) {
                                    continue;
                                }

                                console.log('🔄 Connecting to peer:', data.peerId);
                                const c = peer.connect(data.peerId, {
                                    metadata: { room: room, username: username },
                                    reliable: true
                                });

                                if (c) {
                                    setupConnection(c);
                                    localStorage.removeItem(key);
                                }
                            }
                        } catch (e) {
                            console.warn('Error parsing:', e);
                            localStorage.removeItem(key);
                        }
                    }
                }
            };

            tryConnect();

            let attempts = 0;
            const maxAttempts = 10;
            const interval = setInterval(() => {
                attempts++;
                if (attempts > maxAttempts || (conn && conn.open)) {
                    clearInterval(interval);
                    return;
                }
                tryConnect();
            }, 1000);

            // Listen for new peers
            const listener = (e) => {
                if (e.key && e.key.startsWith('peer_connect_') && e.key !== peerKey) {
                    try {
                        const data = JSON.parse(e.newValue);
                        if (data.peerId !== peerId && data.room === room) {
                            if (!conn || !conn.open || conn.peer !== data.peerId) {
                                console.log('🔄 New peer detected:', data.peerId);
                                const c = peer.connect(data.peerId, {
                                    metadata: { room: room, username: username },
                                    reliable: true
                                });
                                if (c) {
                                    setupConnection(c);
                                    localStorage.removeItem(e.key);
                                }
                            }
                        }
                    } catch (err) {}
                }
            };

            window.addEventListener('storage', listener);
            setTimeout(() => {
                window.removeEventListener('storage', listener);
            }, 30000);

            setTimeout(() => {
                localStorage.removeItem(peerKey);
            }, 300000);
        }

        // ============ JOIN ROOM ============
        async function joinRoom() {
            const name = userNameInput.value.trim();
            const room = roomNameInput.value.trim();
            const pass = roomPassInput.value.trim();

            if (!name || !room || !pass) {
                showError('❌ Please fill all fields');
                return;
            }

            username = name;
            currentRoom = room;
            errorBox.textContent = '';

            try {
                await initPeer();

                let roomData = getRoomData(room);

                if (!roomData) {
                    roomData = {
                        password: pass,
                        users: [username],
                        messages: []
                    };
                    setRoomData(room, roomData);
                    addMessage('', '🟢 Room created! Share the room name and password.', true);
                } else {
                    if (roomData.password !== pass) {
                        showError('❌ Wrong password!');
                        return;
                    }
                    if (!roomData.users) roomData.users = [];
                    if (!roomData.users.includes(username)) {
                        roomData.users.push(username);
                    }
                    clearMessages();
                    if (roomData.messages) {
                        roomData.messages.forEach(msg => {
                            if (msg.type === 'image') {
                                addImageMessage(msg.sender, msg.image, msg.caption);
                            } else {
                                addMessage(msg.sender, msg.text);
                            }
                        });
                    }
                    setRoomData(room, roomData);
                }

                connectToRoom(room);

                loginSection.style.display = 'none';
                chatArea.style.display = 'flex';
                displayRoom.textContent = room;
                avatarDisplay.textContent = getAvatar(room);
                setStatus(true);
                msgInput.focus();

                sessionStorage.setItem('chat_room', currentRoom);
                sessionStorage.setItem('chat_user', username);

            } catch (err) {
                showError('❌ ' + err.message);
                console.error(err);
            }
        }

        // ============ SEND MESSAGE ============
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !currentRoom) return;

            const roomData = getRoomData(currentRoom);
            if (roomData) {
                if (!roomData.messages) roomData.messages = [];
                roomData.messages.push({ sender: username, type: 'text', text: text, time: Date.now() });
                setRoomData(currentRoom, roomData);
            }

            if (conn && conn.open) {
                conn.send({ type: 'message', sender: username, text: text });
                console.log('📤 Sent message to:', conn.peer);
            } else {
                console.warn('⚠️ No connection, retrying...');
                connectToRoom(currentRoom);
                setTimeout(() => {
                    if (conn && conn.open) {
                        conn.send({ type: 'message', sender: username, text: text });
                    }
                }, 2000);
            }

            addMessage(username, text);
            msgInput.value = '';
            msgInput.focus();
        }

        // ============ EXIT ROOM ============
        function exitRoom() {
            if (!currentRoom) return;

            if (conn) {
                try { conn.close(); } catch (e) {}
                conn = null;
            }

            for (let key in localStorage) {
                if (key.startsWith('peer_connect_' + currentRoom)) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.peerId === peerId || data.peerId === peer?.id) {
                            localStorage.removeItem(key);
                        }
                    } catch (e) {}
                }
            }

            const roomData = getRoomData(currentRoom);
            if (roomData) {
                if (roomData.users) {
                    roomData.users = roomData.users.filter(u => u !== username);
                }
                if (!roomData.users || roomData.users.length === 0) {
                    deleteRoomData(currentRoom);
                } else {
                    setRoomData(currentRoom, roomData);
                }
            }

            currentRoom = '';
            username = '';

            loginSection.style.display = 'flex';
            chatArea.style.display = 'none';
            clearMessages();
            setStatus(false);
            errorBox.textContent = '✅ Room cleared. All data deleted.';
            roomNameInput.value = '';
            roomPassInput.value = '';

            sessionStorage.removeItem('chat_room');
            sessionStorage.removeItem('chat_user');

            setTimeout(() => {
                if (errorBox.textContent === '✅ Room cleared. All data deleted.') {
                    errorBox.textContent = '';
                }
            }, 4000);

            if (peer) {
                try { peer.destroy(); } catch (e) {}
                peer = null;
                conn = null;
            }
        }

        // ============ AUTO RECONNECT ============
        function checkConnection() {
            if (currentRoom && (!conn || !conn.open)) {
                console.log('🔄 Reconnecting...');
                connectToRoom(currentRoom);
            }
        }

        // ============ EVENT LISTENERS ============
        joinBtn.addEventListener('click', joinRoom);
        sendBtn.addEventListener('click', sendMessage);
        exitBtn.addEventListener('click', exitRoom);
        imageBtn.addEventListener('click', sendImage);

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        roomPassInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
        roomNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomPassInput.focus();
        });
        userNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomNameInput.focus();
        });

        setInterval(checkConnection, 3000);

        // Auto join from session
        window.addEventListener('load', () => {
            const savedRoom = sessionStorage.getItem('chat_room');
            const savedUser = sessionStorage.getItem('chat_user');
            if (savedRoom && savedUser) {
                userNameInput.value = savedUser;
                roomNameInput.value = savedRoom;
                const savedPass = sessionStorage.getItem('chat_pass');
                if (savedPass) {
                    roomPassInput.value = savedPass;
                    setTimeout(joinRoom, 500);
                }
            }
        });

        // URL params
        const params = new URLSearchParams(window.location.search);
        const roomParam = params.get('room');
        const passParam = params.get('pass');
        const nameParam = params.get('name');

        if (roomParam && passParam && nameParam) {
            userNameInput.value = nameParam;
            roomNameInput.value = roomParam;
            roomPassInput.value = passParam;
            setTimeout(joinRoom, 500);
        }

        console.log('💬 Chat Loaded!');
        console.log('📸 Click 📸 to send images!');
        console.log('🔗 No backend needed!');
    </script>

</body>
</html>
