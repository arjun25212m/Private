<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💬 Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b141a;
            color: #e9edef;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== LOGIN SCREEN ========== */
        #loginSection {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b141a;
            padding: 20px;
        }

        .login-box {
            background: #1f2c33;
            border-radius: 28px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .login-box .logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 8px;
        }

        .login-box h2 {
            text-align: center;
            font-size: 22px;
            color: #e9edef;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .login-box .sub {
            text-align: center;
            font-size: 13px;
            color: #8696a0;
            margin-bottom: 20px;
        }

        .login-box .form-group {
            margin-bottom: 14px;
        }

        .login-box label {
            display: block;
            font-size: 12px;
            color: #8696a0;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #2a3942;
            color: #e9edef;
            font-size: 15px;
            outline: 2px solid transparent;
            transition: 0.3s;
        }

        .login-box input:focus {
            outline-color: #00a884;
            background: #1f2c33;
        }

        .login-box input::placeholder {
            color: #5e6f7a;
        }

        .login-box .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #00a884;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .login-box .btn:active {
            transform: scale(0.97);
            background: #008f72;
        }

        .login-box .error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }

        .login-box .admin-link {
            text-align: center;
            margin-top: 14px;
        }

        .login-box .admin-link a {
            color: #5e6f7a;
            font-size: 12px;
            text-decoration: none;
        }

        /* ========== CHAT SCREEN ========== */
        #chatArea {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: #0b141a;
        }

        /* Chat Header */
        .chat-header {
            background: #1f2c33;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a3942;
            flex-shrink: 0;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #00a884;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
        }

        .chat-header .info {
            flex: 1;
            min-width: 0;
        }

        .chat-header .info .name {
            font-size: 16px;
            font-weight: 500;
            color: #e9edef;
        }

        .chat-header .info .status {
            font-size: 12px;
            color: #8696a0;
        }

        .chat-header .info .status.online {
            color: #00a884;
        }

        .chat-header .exit-btn {
            background: transparent;
            border: none;
            color: #8696a0;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .chat-header .exit-btn:active {
            background: #2a3942;
        }

        /* Messages */
        #messages {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #0b141a;
            min-height: 0;
        }

        #messages .msg {
            padding: 8px 14px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #messages .msg.me {
            background: #005c4b;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        #messages .msg.other {
            background: #1f2c33;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        #messages .msg.system {
            background: transparent;
            color: #8696a0;
            font-size: 12px;
            align-self: center;
            max-width: 100%;
            text-align: center;
            padding: 6px 12px;
        }

        #messages .msg .sender {
            font-size: 11px;
            font-weight: 600;
            color: #00a884;
            display: block;
            margin-bottom: 2px;
        }

        #messages .msg.me .sender {
            color: #7ec8e3;
        }

        #messages .msg .time {
            font-size: 10px;
            color: #8696a0;
            float: right;
            margin-left: 10px;
            margin-top: 2px;
        }

        #messages .msg.me .time {
            color: #7ec8e3;
        }

        /* Loading */
        .loading-msg {
            text-align: center;
            color: #8696a0;
            font-size: 13px;
            padding: 30px 0;
        }

        /* ========== BOTTOM BAR ========== */
        .chat-bottom {
            background: #1f2c33;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #2a3942;
            flex-shrink: 0;
        }

        .chat-bottom .emoji-btn {
            background: transparent;
            border: none;
            color: #8696a0;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .chat-bottom .emoji-btn:active {
            background: #2a3942;
        }

        .chat-bottom input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 20px;
            background: #2a3942;
            color: #e9edef;
            font-size: 15px;
            outline: none;
            min-width: 0;
        }

        .chat-bottom input::placeholder {
            color: #5e6f7a;
        }

        .chat-bottom .send-btn {
            background: #00a884;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-bottom .send-btn:active {
            transform: scale(0.92);
            background: #008f72;
        }

        /* ========== SCROLLBAR ========== */
        #messages::-webkit-scrollbar {
            width: 4px;
        }
        #messages::-webkit-scrollbar-track {
            background: transparent;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #2a3942;
            border-radius: 10px;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .login-box {
                padding: 30px 20px;
            }
            .chat-header {
                padding: 10px 12px;
            }
            .chat-header .info .name {
                font-size: 14px;
            }
            #messages {
                padding: 8px 12px;
            }
            #messages .msg {
                font-size: 13px;
                padding: 6px 12px;
            }
            .chat-bottom {
                padding: 6px 10px;
            }
            .chat-bottom input {
                font-size: 14px;
                padding: 8px 12px;
            }
            .chat-bottom .send-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== LOGIN ========== -->
    <div id="loginSection">
        <div class="login-box">
            <div class="logo">💬</div>
            <h2>Private Chat</h2>
            <p class="sub">Same room + password = same chat</p>

            <div class="form-group">
                <label>👤 Your Name</label>
                <input type="text" id="userName" placeholder="Enter your name..." />
            </div>
            <div class="form-group">
                <label>🏷️ Room Name</label>
                <input type="text" id="roomName" placeholder="Enter room name..." />
            </div>
            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" id="roomPass" placeholder="Enter password..." />
            </div>

            <button class="btn" id="joinBtn">Join / Create Room</button>
            <div class="error" id="errorBox"></div>

            <div class="admin-link">
                <a href="admin.html">👑 Admin Panel</a>
            </div>
        </div>
    </div>

    <!-- ========== CHAT ========== -->
    <div id="chatArea">

        <!-- Header -->
        <div class="chat-header">
            <div class="avatar" id="avatarDisplay">👤</div>
            <div class="info">
                <div class="name" id="displayRoom">Room</div>
                <div class="status online" id="statusDisplay">● Online</div>
            </div>
            <button class="exit-btn" id="exitBtn" title="Exit Room">✕</button>
        </div>

        <!-- Messages -->
        <div id="messages">
            <div class="loading-msg">💬 No messages yet</div>
        </div>

        <!-- Bottom Bar -->
        <div class="chat-bottom">
            <button class="emoji-btn" id="emojiBtn">😊</button>
            <input type="text" id="msgInput" placeholder="Type a message..." />
            <button class="send-btn" id="sendBtn">➤</button>
        </div>

    </div>

    <script>
        // ============================================================
        // WHATSAPP STYLE CHAT - REAL TIME
        // ============================================================

        // ============ CONFIG ============
        const SOCKET_URL = 'https://private-chat-backend-qklg.onrender.com';

        const socket = io(SOCKET_URL, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 5
        });

        // ============ DOM ============
        const loginSection = document.getElementById('loginSection');
        const chatArea = document.getElementById('chatArea');
        const userNameInput = document.getElementById('userName');
        const roomNameInput = document.getElementById('roomName');
        const roomPassInput = document.getElementById('roomPass');
        const joinBtn = document.getElementById('joinBtn');
        const exitBtn = document.getElementById('exitBtn');
        const sendBtn = document.getElementById('sendBtn');
        const emojiBtn = document.getElementById('emojiBtn');
        const msgInput = document.getElementById('msgInput');
        const messagesDiv = document.getElementById('messages');
        const displayRoom = document.getElementById('displayRoom');
        const avatarDisplay = document.getElementById('avatarDisplay');
        const statusDisplay = document.getElementById('statusDisplay');
        const errorBox = document.getElementById('errorBox');

        // ============ STATE ============
        let currentRoom = '';
        let username = '';
        let isOnline = false;

        // ============ HELPERS ============
        function showError(msg) {
            errorBox.textContent = msg;
            setTimeout(() => {
                if (errorBox.textContent === msg) errorBox.textContent = '';
            }, 5000);
        }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function setStatus(online) {
            isOnline = online;
            statusDisplay.textContent = online ? '● Online' : '● Offline';
            statusDisplay.className = 'status' + (online ? ' online' : '');
        }

        function getAvatar(name) {
            return name.charAt(0).toUpperCase();
        }

        function addMessage(sender, text, isSystem = false) {
            const loading = messagesDiv.querySelector('.loading-msg');
            if (loading) loading.remove();

            const div = document.createElement('div');
            div.className = 'msg';

            if (isSystem) {
                div.className = 'msg system';
                div.textContent = text;
            } else if (sender === username) {
                div.className = 'msg me';
                div.innerHTML = `<span class="time">${getTime()}</span> ${text}`;
            } else {
                div.className = 'msg other';
                div.innerHTML = `<span class="sender">${sender}</span> ${text} <span class="time">${getTime()}</span>`;
            }

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function clearMessages() {
            messagesDiv.innerHTML = '<div class="loading-msg">💬 No messages yet</div>';
        }

        // ============ EMOJI PICKER ============
        const emojis = ['❤️', '😘', '💕', '🥰', '😍', '💋', '🔥', '🌹', '😎', '🤗', '😂', '😭', '😊', '🙈', '💀', '✨', '🌟', '💯', '🎉',
            '😈'
        ];
        let emojiPickerOpen = false;

        function toggleEmojiPicker() {
            if (emojiPickerOpen) {
                const picker = document.querySelector('.emoji-picker');
                if (picker) picker.remove();
                emojiPickerOpen = false;
                return;
            }

            const picker = document.createElement('div');
            picker.className = 'emoji-picker';
            picker.style.cssText = `
                position: fixed;
                bottom: 72px;
                left: 50%;
                transform: translateX(-50%);
                background: #1f2c33;
                border-radius: 16px;
                padding: 10px 12px;
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                max-width: 320px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.6);
                z-index: 999;
                border: 1px solid #2a3942;
            `;

            emojis.forEach(e => {
                const btn = document.createElement('button');
                btn.textContent = e;
                btn.style.cssText = `
                    background: transparent;
                    border: none;
                    font-size: 28px;
                    cursor: pointer;
                    padding: 4px 6px;
                    border-radius: 8px;
                    transition: 0.15s;
                `;
                btn.onmouseover = () => btn.style.background = '#2a3942';
                btn.onmouseout = () => btn.style.background = 'transparent';
                btn.onclick = () => {
                    msgInput.value += e;
                    msgInput.focus();
                    toggleEmojiPicker();
                };
                picker.appendChild(btn);
            });

            document.body.appendChild(picker);
            emojiPickerOpen = true;

            // Close on outside click
            setTimeout(() => {
                document.addEventListener('click', function closePicker(e) {
                    if (!picker.contains(e.target) && e.target !== emojiBtn) {
                        picker.remove();
                        emojiPickerOpen = false;
                        document.removeEventListener('click', closePicker);
                    }
                });
            }, 10);
        }

        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleEmojiPicker();
        });

        // ============ JOIN ROOM ============
        function joinRoom() {
            const name = userNameInput.value.trim();
            const room = roomNameInput.value.trim();
            const pass = roomPassInput.value.trim();

            if (!name || !room || !pass) {
                showError('❌ Please fill all fields');
                return;
            }

            username = name;
            currentRoom = room;
            errorBox.textContent = '';

            socket.emit('join-room', {
                room: room,
                password: pass,
                username: name
            });
        }

        // ============ SEND MESSAGE ============
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !currentRoom) return;

            socket.emit('send-message', {
                room: currentRoom,
                text: text
            });
            msgInput.value = '';
            msgInput.focus();
        }

        // ============ EXIT ROOM ============
        function exitRoom() {
            if (!currentRoom) return;

            socket.emit('exit-room', { room: currentRoom });
            currentRoom = '';
            username = '';

            loginSection.style.display = 'flex';
            chatArea.style.display = 'none';
            clearMessages();
            setStatus(false);
            errorBox.textContent = '✅ Room cleared. All data deleted.';
            roomNameInput.value = '';
            roomPassInput.value = '';

            setTimeout(() => {
                if (errorBox.textContent === '✅ Room cleared. All data deleted.') {
                    errorBox.textContent = '';
                }
            }, 4000);
        }

        // ============ SOCKET EVENTS ============
        socket.on('connect', () => {
            console.log('✅ Connected to server');
            errorBox.textContent = '';
            setStatus(true);
        });

        socket.on('disconnect', () => {
            showError('⚠️ Disconnected. Reconnecting...');
            setStatus(false);
        });

        socket.on('connect_error', (err) => {
            showError('❌ Connection failed: ' + err.message);
            setStatus(false);
        });

        socket.on('load-messages', (messages) => {
            clearMessages();
            if (messages && messages.length > 0) {
                messages.forEach(msg => addMessage(msg.sender, msg.text));
            }
            loginSection.style.display = 'none';
            chatArea.style.display = 'flex';
            displayRoom.textContent = currentRoom;
            avatarDisplay.textContent = getAvatar(currentRoom);
            setStatus(true);
            msgInput.focus();
        });

        socket.on('new-message', (msg) => {
            addMessage(msg.sender, msg.text);
        });

        socket.on('system-message', (text) => {
            addMessage('', text, true);
        });

        socket.on('error', (err) => {
            showError('❌ ' + err);
            if (err.includes('Wrong password')) {
                roomPassInput.value = '';
                roomPassInput.focus();
            }
        });

        // ============ EVENT LISTENERS ============
        joinBtn.addEventListener('click', joinRoom);
        sendBtn.addEventListener('click', sendMessage);
        exitBtn.addEventListener('click', exitRoom);

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        roomPassInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });

        roomNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomPassInput.focus();
        });

        userNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomNameInput.focus();
        });

        window.addEventListener('beforeunload', function() {
            if (currentRoom) {
                socket.emit('exit-room', { room: currentRoom });
            }
        });

        console.log('💬 WhatsApp-Style Chat Loaded!');
        console.log('📡 Server:', SOCKET_URL);
    </script>

</body>
</html>
