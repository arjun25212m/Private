<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💕 Private Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e14;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }
        .container {
            background: #1a2029;
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 420px;
            height: 96vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 8px;
            color: #5fc3ff;
        }
        #loginSection {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            color: #a0b8d0;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 30px;
            background: #2a3340;
            color: #fff;
            font-size: 15px;
            outline: 2px solid transparent;
        }
        input:focus {
            outline-color: #4c9aff;
        }
        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 30px;
            background: #4c9aff;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-danger {
            background: #d9534f;
        }
        .btn-purple {
            background: #8e44ad;
        }
        .btn-small {
            width: auto;
            padding: 8px 14px;
            font-size: 13px;
        }
        #errorBox {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 6px;
            min-height: 18px;
        }
        .hint {
            font-size: 11px;
            color: #5f7490;
            text-align: center;
            margin-top: 8px;
        }
        #chatArea {
            display: none;
            flex: 1;
            flex-direction: column;
        }
        #roomStatus {
            text-align: center;
            font-size: 11px;
            color: #7a96b5;
            padding: 4px 0 8px 0;
            border-bottom: 1px solid #2a3340;
        }
        #roomStatus .online {
            color: #28a745;
        }
        #roomStatus .offline {
            color: #d9534f;
        }
        #messages {
            flex: 1;
            background: #11161e;
            padding: 10px;
            border-radius: 16px;
            overflow-y: auto;
            margin: 6px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 0;
        }
        #messages .msg {
            padding: 6px 12px;
            border-radius: 16px;
            max-width: 85%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #messages .msg.me {
            background: #1d6bb3;
            align-self: flex-end;
        }
        #messages .msg.other {
            background: #2a3340;
            align-self: flex-start;
        }
        #messages .msg.system {
            background: transparent;
            color: #6f859c;
            font-size: 11px;
            align-self: center;
            max-width: 100%;
            font-style: italic;
        }
        #messages .msg-image {
            max-width: 85%;
            align-self: flex-start;
            padding: 4px;
            border-radius: 12px;
            background: #1a2029;
            border: 1px solid #2a3340;
        }
        #messages .msg-image.me {
            align-self: flex-end;
            border-color: #1d6bb3;
        }
        #messages .msg-image img {
            max-width: 180px;
            max-height: 200px;
            border-radius: 10px;
            display: block;
        }
        #messages .msg-image .image-sender {
            font-size: 10px;
            color: #7a96b5;
            text-align: center;
        }
        #messages .msg-image .image-caption {
            font-size: 12px;
            color: #a0b8d0;
            text-align: center;
        }
        .msg .username-tag {
            font-weight: bold;
            color: #5fc3ff;
            font-size: 12px;
            display: block;
        }
        .msg.other .username-tag {
            color: #f1c40f;
        }
        .emoji-row {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin: 2px 0 4px 0;
            flex-wrap: wrap;
        }
        .emoji-row button {
            background: #2a3340;
            border: none;
            border-radius: 30px;
            padding: 3px 8px;
            font-size: 18px;
            cursor: pointer;
        }
        .emoji-row button:active {
            transform: scale(0.85);
        }
        .input-row {
            display: flex;
            gap: 6px;
        }
        .input-row input {
            flex: 1;
            padding: 10px 14px;
            font-size: 14px;
        }
        .input-row .btn {
            width: auto;
            padding: 10px 16px;
            margin-top: 0;
            font-size: 13px;
        }
        .input-row .btn-image {
            padding: 10px 14px;
            font-size: 18px;
            background: #8e44ad;
        }
        .exit-row {
            margin-top: 6px;
            display: flex;
            gap: 6px;
        }
        .exit-row .btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .status-dot.online {
            background: #28a745;
        }
        .status-dot.offline {
            background: #d9534f;
        }
        .status-dot.connecting {
            background: #ffc107;
            animation: blink 0.5s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        #imagePreview {
            display: none;
            background: #11161e;
            border-radius: 12px;
            padding: 8px;
            margin: 4px 0;
            text-align: center;
        }
        #imagePreview img {
            max-height: 100px;
            border-radius: 8px;
        }
        #imagePreview .preview-close {
            float: right;
            background: #d9534f;
            border: none;
            border-radius: 50%;
            color: #fff;
            width: 22px;
            height: 22px;
            font-size: 14px;
            cursor: pointer;
        }
        #messages::-webkit-scrollbar {
            width: 4px;
        }
        #messages::-webkit-scrollbar-track {
            background: #11161e;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #3d4a5c;
            border-radius: 10px;
        }
        .loading {
            text-align: center;
            color: #6f859c;
            padding: 20px;
        }
        .admin-link {
            text-align: center;
            margin-top: 4px;
        }
        .admin-link a {
            color: #5f7490;
            font-size: 11px;
            text-decoration: none;
            border: 1px solid #2a3340;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .hidden {
            display: none;
        }
        .msg-time {
            font-size: 9px;
            color: #5f7490;
            margin-left: 6px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔒 Private Chat 💕</h2>

        <div id="loginSection">
            <div class="form-group">
                <label>👤 Your Name</label>
                <input type="text" id="userName" placeholder="e.g. Arjun, Priya..." />
            </div>
            <div class="form-group">
                <label>🏷️ Room Name</label>
                <input type="text" id="roomName" placeholder="e.g. love-forever" />
            </div>
            <div class="form-group">
                <label>🔑 Room Password</label>
                <input type="password" id="roomPass" placeholder="Set a password for room" />
            </div>
            <button class="btn" id="joinBtn">🚪 Create / Join Room</button>
            <div id="errorBox"></div>
            <div class="admin-link">
                <a href="admin.html">👑 Admin Panel</a>
            </div>
            <p class="hint">💡 Same room name + password = same chat</p>
        </div>

        <div id="chatArea">
            <div id="roomStatus">
                <span class="status-dot connecting" id="statusDot"></span>
                Room: <span id="displayRoom"></span> &nbsp;|&nbsp; 👤 <span id="displayUser"></span>
                <span style="font-size:9px;color:#6f859c;" id="peerIdDisplay"></span>
            </div>

            <div id="imagePreview">
                <button class="preview-close" onclick="cancelImage()">✕</button>
                <img id="previewImg" src="" alt="Preview" />
                <input type="text" id="captionInput" placeholder="Add caption..." style="width:100%;margin-top:4px;padding:6px;border-radius:20px;background:#2a3340;color:#fff;border:none;font-size:12px;" />
            </div>

            <div id="messages"><div class="loading">💬 Waiting for messages...</div></div>

            <div class="emoji-row">
                <button onclick="addEmoji('❤️')">❤️</button>
                <button onclick="addEmoji('😘')">😘</button>
                <button onclick="addEmoji('💕')">💕</button>
                <button onclick="addEmoji('🥰')">🥰</button>
                <button onclick="addEmoji('😍')">😍</button>
                <button onclick="addEmoji('💋')">💋</button>
                <button onclick="addEmoji('🔥')">🔥</button>
                <button onclick="addEmoji('🌹')">🌹</button>
                <button onclick="addEmoji('😎')">😎</button>
                <button onclick="addEmoji('🤗')">🤗</button>
            </div>

            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Type a message..." />
                <button class="btn" id="sendBtn">Send</button>
                <button class="btn btn-image" id="imageBtn">📸</button>
            </div>
            <div class="exit-row">
                <button class="btn btn-danger" id="exitBtn">🚪 Exit</button>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // 💕 COMPLETE CHAT APP - FIXED REAL-TIME
        // =============================================

        // DOM Elements
        const loginSection = document.getElementById('loginSection');
        const chatArea = document.getElementById('chatArea');
        const userNameInput = document.getElementById('userName');
        const roomNameInput = document.getElementById('roomName');
        const roomPassInput = document.getElementById('roomPass');
        const joinBtn = document.getElementById('joinBtn');
        const exitBtn = document.getElementById('exitBtn');
        const sendBtn = document.getElementById('sendBtn');
        const imageBtn = document.getElementById('imageBtn');
        const msgInput = document.getElementById('msgInput');
        const messagesDiv = document.getElementById('messages');
        const displayRoom = document.getElementById('displayRoom');
        const displayUser = document.getElementById('displayUser');
        const peerIdDisplay = document.getElementById('peerIdDisplay');
        const errorBox = document.getElementById('errorBox');
        const statusDot = document.getElementById('statusDot');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const captionInput = document.getElementById('captionInput');

        // ============ State ============
        let currentRoom = '';
        let username = '';
        let peer = null;
        let peerId = null;
        let conn = null;
        let pendingImage = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 5;

        // ============ LocalStorage ============
        function getRoomData(room) {
            try {
                const data = localStorage.getItem('room_' + room);
                return data ? JSON.parse(data) : null;
            } catch (e) { return null; }
        }

        function setRoomData(room, data) {
            localStorage.setItem('room_' + room, JSON.stringify(data));
        }

        function deleteRoomData(room) {
            localStorage.removeItem('room_' + room);
        }

        // ============ UI Helpers ============
        function addEmoji(emoji) {
            msgInput.value += emoji;
            msgInput.focus();
        }

        function showError(msg) {
            errorBox.textContent = msg;
            setTimeout(() => {
                if (errorBox.textContent === msg) errorBox.textContent = '';
            }, 5000);
        }

        function setStatus(status) {
            statusDot.className = 'status-dot ' + status;
        }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(sender, text, isSystem = false) {
            const loading = messagesDiv.querySelector('.loading');
            if (loading) loading.remove();

            const div = document.createElement('div');
            div.className = 'msg';
            const time = getTime();

            if (isSystem) {
                div.className = 'msg system';
                div.textContent = text;
            } else if (sender === username) {
                div.className = 'msg me';
                div.innerHTML = `<span class="username-tag">You <span class="msg-time">${time}</span></span> ${text}`;
            } else {
                div.className = 'msg other';
                div.innerHTML = `<span class="username-tag">${sender} <span class="msg-time">${time}</span></span> ${text}`;
            }

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addImageMessage(sender, imageData, caption = '') {
            const loading = messagesDiv.querySelector('.loading');
            if (loading) loading.remove();

            const div = document.createElement('div');
            div.className = 'msg-image';
            if (sender === username) div.classList.add('me');

            div.innerHTML = `
                <img src="${imageData}" alt="Image" />
                ${caption ? `<div class="image-caption">${caption}</div>` : ''}
                <div class="image-sender">${sender === username ? 'You' : sender}</div>
            `;

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function clearMessages() {
            messagesDiv.innerHTML = '<div class="loading">💬 Waiting for messages...</div>';
        }

        function cancelImage() {
            imagePreview.style.display = 'none';
            pendingImage = null;
            previewImg.src = '';
            captionInput.value = '';
        }

        // ============ PeerJS ============
        function initPeer() {
            return new Promise((resolve, reject) => {
                if (peer && peer.open) {
                    resolve(peer.id);
                    return;
                }

                // Destroy old peer if exists
                if (peer) {
                    try { peer.destroy(); } catch (e) {}
                    peer = null;
                }

                peer = new Peer({
                    debug: 2,
                    config: {
                        'iceServers': [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                const timeout = setTimeout(() => {
                    reject(new Error('Peer connection timeout'));
                }, 15000);

                peer.on('open', (id) => {
                    clearTimeout(timeout);
                    peerId = id;
                    console.log('✅ Peer ID:', id);
                    peerIdDisplay.textContent = 'ID: ' + id;
                    setStatus('online');
                    resolve(id);
                });

                peer.on('error', (err) => {
                    clearTimeout(timeout);
                    console.error('Peer error:', err);
                    setStatus('offline');
                    if (err.type === 'unavailable-id' || err.type === 'peer-unavailable') {
                        // Try again with new ID
                        if (reconnectAttempts < MAX_RECONNECT) {
                            reconnectAttempts++;
                            setTimeout(() => {
                                initPeer().then(resolve).catch(reject);
                            }, 2000);
                        } else {
                            reject(err);
                        }
                    } else {
                        reject(err);
                    }
                });

                peer.on('connection', (c) => {
                    console.log('📡 Incoming connection from:', c.peer);
                    handleConnection(c);
                });

                peer.on('disconnected', () => {
                    console.log('⚠️ Peer disconnected');
                    setStatus('connecting');
                    if (peer && !peer.destroyed) {
                        setTimeout(() => {
                            if (peer) peer.reconnect();
                        }, 3000);
                    }
                });
            });
        }

        // ============ Handle Connection ============
        function handleConnection(c) {
            const room = c.metadata?.room;
            if (!room) {
                console.warn('Connection without room metadata');
                return;
            }

            // If we already have a connection for this room, close old one
            if (conn && conn.open && conn.peer === c.peer) {
                return;
            }

            conn = c;

            c.on('data', (data) => {
                console.log('📩 Received:', data.type, 'from', data.sender);
                if (data.type === 'message') {
                    addMessage(data.sender, data.text);
                } else if (data.type === 'image') {
                    addImageMessage(data.sender, data.image, data.caption);
                } else if (data.type === 'system') {
                    addMessage('', data.text, true);
                } else if (data.type === 'ping') {
                    // Respond to ping
                    if (c.open) {
                        c.send({ type: 'pong' });
                    }
                }
            });

            c.on('close', () => {
                console.log('🔴 Connection closed:', c.peer);
                addMessage('', '🔴 User disconnected', true);
                if (conn === c) {
                    conn = null;
                }
            });

            c.on('error', (err) => {
                console.error('Connection error:', err);
                if (conn === c) {
                    conn = null;
                }
            });

            // Send welcome
            if (c.open) {
                c.send({ type: 'system', text: `🟢 ${username} joined the chat` });
            }

            console.log('📡 Connected to:', c.peer);
        }

        // ============ Connect to Room ============
        function connectToRoom(room) {
            // First, try to find existing peers
            const peerKey = 'peer_connect_' + room;

            // Clean up old peer entries
            for (let key in localStorage) {
                if (key.startsWith('peer_connect_') && key !== peerKey) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.peerId === peerId) {
                            localStorage.removeItem(key);
                        }
                    } catch (e) {}
                }
            }

            // Register ourselves
            const myData = {
                peerId: peerId,
                username: username,
                room: room,
                timestamp: Date.now()
            };
            localStorage.setItem(peerKey, JSON.stringify(myData));

            // Try to connect to others
            let connected = false;

            const connectToPeers = () => {
                for (let key in localStorage) {
                    if (key.startsWith('peer_connect_') && key !== peerKey) {
                        try {
                            const data = JSON.parse(localStorage.getItem(key));
                            if (data.peerId !== peerId && data.room === room) {
                                // Check if not already connected
                                if (conn && conn.open && conn.peer === data.peerId) {
                                    continue;
                                }

                                console.log('🔄 Connecting to peer:', data.peerId);
                                const c = peer.connect(data.peerId, {
                                    metadata: { room: room, username: username },
                                    reliable: true
                                });

                                if (c) {
                                    handleConnection(c);
                                    connected = true;
                                    // Clean up their entry after connecting
                                    localStorage.removeItem(key);
                                }
                            }
                        } catch (e) {
                            console.warn('Error parsing peer data:', e);
                            localStorage.removeItem(key);
                        }
                    }
                }
            };

            // Connect immediately
            connectToPeers();

            // Keep trying for 10 seconds
            let attempts = 0;
            const maxAttempts = 10;
            const interval = setInterval(() => {
                attempts++;
                if (attempts > maxAttempts) {
                    clearInterval(interval);
                    return;
                }
                if (!conn || !conn.open) {
                    connectToPeers();
                }
            }, 1000);

            // Clean up our entry after 5 minutes
            setTimeout(() => {
                localStorage.removeItem(peerKey);
            }, 300000);

            // Listen for new peers
            const listener = (e) => {
                if (e.key && e.key.startsWith('peer_connect_') && e.key !== peerKey) {
                    try {
                        const data = JSON.parse(e.newValue);
                        if (data.peerId !== peerId && data.room === room) {
                            if (!conn || !conn.open || conn.peer !== data.peerId) {
                                console.log('🔄 New peer detected:', data.peerId);
                                const c = peer.connect(data.peerId, {
                                    metadata: { room: room, username: username },
                                    reliable: true
                                });
                                if (c) {
                                    handleConnection(c);
                                    localStorage.removeItem(e.key);
                                }
                            }
                        }
                    } catch (err) {
                        // Ignore
                    }
                }
            };

            window.addEventListener('storage', listener);

            // Clean up listener after 30 seconds
            setTimeout(() => {
                window.removeEventListener('storage', listener);
            }, 30000);
        }

        // ============ Join Room ============
        async function joinRoom() {
            const name = userNameInput.value.trim();
            const room = roomNameInput.value.trim();
            const pass = roomPassInput.value.trim();

            if (!name || !room || !pass) {
                showError('❌ Please enter name, room and password');
                return;
            }

            username = name;
            currentRoom = room;
            errorBox.textContent = '';
            reconnectAttempts = 0;

            try {
                // Init peer
                await initPeer();

                // Get room data
                let roomData = getRoomData(room);

                if (!roomData) {
                    roomData = {
                        password: pass,
                        users: [username],
                        messages: [],
                        created: Date.now()
                    };
                    setRoomData(room, roomData);
                    addMessage('', '🟢 Room created! Share the room name and password.', true);
                } else {
                    if (roomData.password !== pass) {
                        showError('❌ Wrong password!');
                        return;
                    }
                    if (!roomData.users) roomData.users = [];
                    if (!roomData.users.includes(username)) {
                        roomData.users.push(username);
                    }
                    // Load messages
                    clearMessages();
                    if (roomData.messages) {
                        roomData.messages.forEach(msg => {
                            if (msg.type === 'image') {
                                addImageMessage(msg.sender, msg.image, msg.caption);
                            } else {
                                addMessage(msg.sender, msg.text);
                            }
                        });
                    }
                    setRoomData(room, roomData);
                }

                // Connect to peers
                connectToRoom(room);

                // Show chat
                loginSection.style.display = 'none';
                chatArea.style.display = 'block';
                displayRoom.textContent = room;
                displayUser.textContent = username;
                setStatus('online');
                msgInput.focus();

                // Save session
                sessionStorage.setItem('chat_room', currentRoom);
                sessionStorage.setItem('chat_user', username);

            } catch (err) {
                showError('❌ ' + err.message);
                console.error(err);
            }
        }

        // ============ Send Message ============
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text || !currentRoom) return;

            // Save to storage
            const roomData = getRoomData(currentRoom);
            if (roomData) {
                if (!roomData.messages) roomData.messages = [];
                roomData.messages.push({ sender: username, type: 'text', text: text, time: Date.now() });
                setRoomData(currentRoom, roomData);
            }

            // Send to peer
            if (conn && conn.open) {
                conn.send({ type: 'message', sender: username, text: text });
                console.log('📤 Sent message to:', conn.peer);
            } else {
                console.warn('⚠️ No connection to send message');
                // Try to reconnect
                connectToRoom(currentRoom);
                // Store in pending
                setTimeout(() => {
                    if (conn && conn.open) {
                        conn.send({ type: 'message', sender: username, text: text });
                    }
                }, 2000);
            }

            addMessage(username, text);
            msgInput.value = '';
            msgInput.focus();
        }

        function sendImageToPeer(imageData, caption) {
            if (conn && conn.open) {
                conn.send({ type: 'image', sender: username, image: imageData, caption: caption || '' });
                console.log('📤 Sent image to:', conn.peer);
            } else {
                console.warn('⚠️ No connection to send image');
            }
        }

        function sendImage(imageData, caption) {
            if (!currentRoom) return;

            // Save to storage
            const roomData = getRoomData(currentRoom);
            if (roomData) {
                if (!roomData.messages) roomData.messages = [];
                roomData.messages.push({ sender: username, type: 'image', image: imageData, caption: caption || '',
                    time: Date.now() });
                setRoomData(currentRoom, roomData);
            }

            // Send to peer
            sendImageToPeer(imageData, caption);

            addImageMessage(username, imageData, caption);
            cancelImage();
        }

        // ============ Exit Room ============
        function exitRoom() {
            if (!currentRoom) return;

            // Close connection
            if (conn) {
                try {
                    conn.close();
                } catch (e) {}
                conn = null;
            }

            // Clean up peer entries
            for (let key in localStorage) {
                if (key.startsWith('peer_connect_' + currentRoom)) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.peerId === peerId || data.peerId === peer?.id) {
                            localStorage.removeItem(key);
                        }
                    } catch (e) {}
                }
            }

            // Remove user from room
            const roomData = getRoomData(currentRoom);
            if (roomData) {
                if (roomData.users) {
                    roomData.users = roomData.users.filter(u => u !== username);
                }
                if (!roomData.users || roomData.users.length === 0) {
                    deleteRoomData(currentRoom);
                } else {
                    setRoomData(currentRoom, roomData);
                }
            }

            currentRoom = '';
            username = '';

            loginSection.style.display = 'flex';
            chatArea.style.display = 'none';
            clearMessages();
            setStatus('offline');
            cancelImage();
            errorBox.textContent = '✅ Room cleared. All data deleted.';
            roomNameInput.value = '';
            roomPassInput.value = '';

            sessionStorage.removeItem('chat_room');
            sessionStorage.removeItem('chat_user');

            setTimeout(() => {
                if (errorBox.textContent === '✅ Room cleared. All data deleted.') {
                    errorBox.textContent = '';
                }
            }, 4000);

            // Destroy peer
            if (peer) {
                try { peer.destroy(); } catch (e) {}
                peer = null;
                conn = null;
            }
        }

        // ============ Select Image ============
        function selectImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    pendingImage = event.target.result;
                    previewImg.src = pendingImage;
                    imagePreview.style.display = 'block';
                    captionInput.value = '';
                    captionInput.focus();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // ============ Auto Reconnect ============
        function checkConnection() {
            if (currentRoom && (!conn || !conn.open)) {
                console.log('🔄 Reconnecting...');
                connectToRoom(currentRoom);
            }
        }

        // ============ Event Listeners ============
        joinBtn.addEventListener('click', joinRoom);
        sendBtn.addEventListener('click', sendMessage);
        exitBtn.addEventListener('click', exitRoom);
        imageBtn.addEventListener('click', selectImage);

        captionInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (pendingImage) {
                    sendImage(pendingImage, captionInput.value.trim());
                }
            }
        });

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        roomPassInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
        roomNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomPassInput.focus();
        });
        userNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') roomNameInput.focus();
        });

        // Auto reconnect check every 5 seconds
        setInterval(checkConnection, 5000);

        // Auto join from session
        window.addEventListener('load', () => {
            const savedRoom = sessionStorage.getItem('chat_room');
            const savedUser = sessionStorage.getItem('chat_user');
            if (savedRoom && savedUser) {
                userNameInput.value = savedUser;
                roomNameInput.value = savedRoom;
                const savedPass = sessionStorage.getItem('chat_pass');
                if (savedPass) {
                    roomPassInput.value = savedPass;
                    setTimeout(joinRoom, 500);
                }
            }
        });

        console.log('💕 Private Chat with Real-time Messages Loaded!');
        console.log('📸 Click 📸 button to send images!');
        console.log('🔗 Messages will appear in real-time!');
    </script>

</body>
</html>
