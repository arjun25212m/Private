<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>👑 Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e14;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }
        .container {
            background: #1a2029;
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 420px;
            height: 96vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
        }
        h2 {
            text-align: center;
            font-size: 22px;
            color: #e74c3c;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 11px;
            color: #7a96b5;
            margin-bottom: 10px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #7a96b5;
            padding: 4px 0 8px 0;
            border-bottom: 1px solid #2a3340;
        }
        .status-bar .online {
            color: #28a745;
        }
        .room-list {
            flex: 1;
            background: #11161e;
            border-radius: 16px;
            padding: 10px;
            overflow-y: auto;
            margin: 8px 0;
        }
        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #2a3340;
        }
        .room-item:last-child {
            border-bottom: none;
        }
        .room-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .room-name {
            color: #5fc3ff;
            font-size: 14px;
            font-weight: bold;
        }
        .room-users {
            color: #7a96b5;
            font-size: 11px;
        }
        .room-pass {
            color: #6f859c;
            font-size: 10px;
        }
        .btn-join {
            background: #e74c3c;
            border: none;
            border-radius: 20px;
            padding: 5px 14px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
        }
        .btn-join:active {
            transform: scale(0.95);
        }
        .btn-refresh {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 30px;
            background: #2a3340;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            margin-top: 6px;
        }
        .btn-refresh:active {
            background: #3d4a5c;
        }
        .btn-exit {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 30px;
            background: #d9534f;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            margin-top: 6px;
        }
        .btn-exit:active {
            background: #b52b27;
        }
        .no-rooms {
            text-align: center;
            color: #6f859c;
            padding: 30px 0;
        }
        .back-link {
            text-align: center;
            margin-top: 6px;
        }
        .back-link a {
            color: #5f7490;
            font-size: 11px;
            text-decoration: none;
            border: 1px solid #2a3340;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .dev-tag {
            background: #e74c3c;
            color: #fff;
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 6px;
        }
        #errorBox {
            color: #ff6b6b;
            font-size: 12px;
            text-align: center;
            margin-top: 4px;
            min-height: 16px;
        }
        .room-list::-webkit-scrollbar {
            width: 4px;
        }
        .room-list::-webkit-scrollbar-track {
            background: #11161e;
        }
        .room-list::-webkit-scrollbar-thumb {
            background: #3d4a5c;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>👑 Admin Panel <span class="dev-tag">DEV</span></h2>
        <p class="subtitle">🔍 Monitor & Join Any Room</p>

        <div class="status-bar">
            <span>📡 <span id="roomCount">0</span> Active Rooms</span>
            <span class="online">🟢 Online</span>
        </div>

        <div class="room-list" id="roomList">
            <div class="no-rooms">Loading rooms...</div>
        </div>

        <button class="btn-refresh" onclick="refreshRooms()">🔄 Refresh</button>
        <button class="btn-exit" onclick="exitAdmin()">🚪 Exit Admin</button>
        <div id="errorBox"></div>

        <div class="back-link">
            <a href="index.html">⬅️ Back to Chat</a>
        </div>
    </div>

    <script>
        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            setTimeout(() => { if (box.textContent === msg) box.textContent = ''; }, 4000);
        }

        function refreshRooms() {
            const list = document.getElementById('roomList');
            const count = document.getElementById('roomCount');
            let html = '';
            let total = 0;

            for (let key in localStorage) {
                if (key.startsWith('room_')) {
                    const roomName = key.replace('room_', '');
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        const userCount = data.users ? data.users.length : 0;
                        const passDisplay = data.password ? '🔒' : '🔓';
                        total++;
                        html += `
                            <div class="room-item">
                                <div class="room-info">
                                    <span class="room-name">🏠 ${roomName}</span>
                                    <span class="room-users">👤 ${userCount} users</span>
                                    <span class="room-pass">${passDisplay} ${data.password ? 'Password: ' + data.password : 'No password'}</span>
                                </div>
                                <button class="btn-join" onclick="joinRoom('${roomName}')">🔓 Join</button>
                            </div>
                        `;
                    } catch (e) {}
                }
            }

            list.innerHTML = html || '<div class="no-rooms">🏠 No active rooms</div>';
            count.textContent = total;
        }

        function joinRoom(roomName) {
            try {
                const data = JSON.parse(localStorage.getItem('room_' + roomName));
                if (!data) {
                    showError('❌ Room not found');
                    return;
                }

                const adminName = '👁️ Admin_' + Math.floor(Math.random() * 1000);

                if (!data.users) data.users = [];
                if (!data.users.includes(adminName)) {
                    data.users.push(adminName);
                    localStorage.setItem('room_' + roomName, JSON.stringify(data));
                }

                const url = 'index.html?room=' + encodeURIComponent(roomName) +
                    '&pass=' + encodeURIComponent(data.password) +
                    '&name=' + encodeURIComponent(adminName);

                window.location.href = url;

            } catch (e) {
                showError('❌ Error: ' + e.message);
            }
        }

        function exitAdmin() {
            for (let key in localStorage) {
                if (key.startsWith('room_')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (data.users) {
                            const filtered = data.users.filter(u => !u.startsWith('👁️ Admin_'));
                            if (filtered.length === 0) {
                                localStorage.removeItem(key);
                            } else {
                                data.users = filtered;
                                localStorage.setItem(key, JSON.stringify(data));
                            }
                        }
                    } catch (e) {}
                }
            }
            window.location.href = 'index.html';
        }

        refreshRooms();
        setInterval(refreshRooms, 3000);

        const params = new URLSearchParams(window.location.search);
        const room = params.get('room');
        const pass = params.get('pass');
        const name = params.get('name');

        if (room && pass && name) {
            sessionStorage.setItem('chat_room', room);
            sessionStorage.setItem('chat_user', name);
            sessionStorage.setItem('chat_pass', pass);
            window.location.href = 'index.html';
        }

        console.log('👑 Admin Panel Loaded!');
    </script>

</body>
</html>
