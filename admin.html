<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel</title>
    <style>
        body {
            background: #0b0e14;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .room {
            background: #1a2029;
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
        }
        .btn {
            background: #e74c3c;
            border: none;
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
        }
        a {
            color: #5fc3ff;
        }
    </style>
</head>
<body>
    <h2>👑 Admin Panel</h2>
    <button onclick="refresh()">🔄 Refresh</button>
    <div id="rooms"></div>
    <p><a href="index.html">⬅️ Back to Chat</a></p>

    <script>
        function refresh() {
            const roomsDiv = document.getElementById('rooms');
            roomsDiv.innerHTML = '';
            let count = 0;
            for (let key in localStorage) {
                if (key.startsWith('room_')) {
                    const roomName = key.replace('room_', '');
                    const data = JSON.parse(localStorage.getItem(key));
                    const users = data.users ? data.users.length : 0;
                    count++;
                    roomsDiv.innerHTML += `
                        <div class="room">
                            <div>
                                <strong>🏠 ${roomName}</strong>
                                <span style="color:#7a96b5;"> 👤 ${users} users</span>
                                <span style="color:#6f859c;font-size:12px;"> 🔒 ${data.password}</span>
                            </div>
                            <button class="btn" onclick="joinRoom('${roomName}')">🔓 Join</button>
                        </div>
                    `;
                }
            }
            if (count === 0) roomsDiv.innerHTML = '<p>No rooms available</p>';
        }

        function joinRoom(roomName) {
            const data = JSON.parse(localStorage.getItem('room_' + roomName));
            if (!data) return alert('Room not found');

            // Create a new user as admin
            const adminName = '👁️ Admin_' + Math.floor(Math.random() * 1000);
            if (!data.users) data.users = [];
            if (!data.users.includes(adminName)) data.users.push(adminName);
            localStorage.setItem('room_' + roomName, JSON.stringify(data));

            // Redirect to main chat with room pre-filled
            window.location.href = 'index.html?room=' + roomName + '&pass=' + data.password + '&name=' + adminName;
        }

        // Auto refresh every 5 seconds
        refresh();
        setInterval(refresh, 5000);

        console.log('👑 Admin Panel Loaded!');
    </script>
</body>
</html>
